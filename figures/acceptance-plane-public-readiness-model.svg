<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520" role="img" aria-labelledby="title desc">
<title id="title">Acceptance Plane Public Readiness Model</title>
<desc id="desc">Public category materials are separated from protected implementation mechanisms.</desc>
<rect x="20" y="20" width="960" height="480" rx="18" fill="#ffffff" stroke="#222" stroke-width="2"/>
<text x="500" y="62" text-anchor="middle" font-family="Arial" font-size="28" font-weight="700">Acceptance Plane™ Public Readiness Model</text>
<rect x="70" y="110" width="390" height="300" rx="14" fill="#eef7ff" stroke="#1769aa" stroke-width="2"/>
<text x="265" y="150" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700">Open Readiness Layer</text>
<text x="110" y="195" font-family="Arial" font-size="17">• Vocabulary</text>
<text x="110" y="225" font-family="Arial" font-size="17">• Scenario corpus</text>
<text x="110" y="255" font-family="Arial" font-size="17">• RFP questions</text>
<text x="110" y="285" font-family="Arial" font-size="17">• Public-interest covenant</text>
<text x="110" y="315" font-family="Arial" font-size="17">• Educational scenario-card linter</text>
<text x="110" y="345" font-family="Arial" font-size="17">• No implementation rights</text>
<rect x="540" y="110" width="390" height="300" rx="14" fill="#fff2ef" stroke="#9a3412" stroke-width="2"/>
<text x="735" y="150" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700">Protected Mechanism Layer</text>
<text x="580" y="195" font-family="Arial" font-size="17">• Production verifier</text>
<text x="580" y="225" font-family="Arial" font-size="17">• Exact evidence models</text>
<text x="580" y="255" font-family="Arial" font-size="17">• Cryptographic binding</text>
<text x="580" y="285" font-family="Arial" font-size="17">• Non-bypassable enforcement</text>
<text x="580" y="315" font-family="Arial" font-size="17">• Conformance/certification rails</text>
<text x="580" y="345" font-family="Arial" font-size="17">• Domain implementations</text>
<text x="500" y="455" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700">Publish the category. Open the readiness layer. Protect the mechanism.</text>
</svg>
